[build]
  command   = "pip install -r requirements.txt"
  publish   = "frontend/static"

[dev]
  command   = "python backend/app.py"
  port      = 5000

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
